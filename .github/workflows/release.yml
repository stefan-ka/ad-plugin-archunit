name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest,    goos: linux,   goarch: amd64 }
          - { os: ubuntu-24.04-arm, goos: linux,   goarch: arm64 }
          - { os: macos-15-intel,   goos: darwin,  goarch: amd64 }
          - { os: macos-latest,     goos: darwin,  goarch: arm64 }
          - { os: windows-latest,   goos: windows, goarch: amd64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'

      - name: Build native image
        shell: bash
        run: |
          ./gradlew nativeCompile
          BINARY=$(./gradlew properties -q | grep "^name:" | awk '{print $2}')
          OUTPUT="${BINARY}-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            cp "build/native/nativeCompile/${BINARY}.exe" "${OUTPUT}.exe"
            echo "ASSET_NAME=${OUTPUT}.exe" >> "$GITHUB_ENV"
          else
            cp "build/native/nativeCompile/${BINARY}" "${OUTPUT}"
            echo "ASSET_NAME=${OUTPUT}" >> "$GITHUB_ENV"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.ASSET_NAME }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
